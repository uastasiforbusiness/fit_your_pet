<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caballo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      position: relative;
      width: 280px;
      height: 580px;
      background: #000;
      border-radius: 40px;
      padding: 12px;
      box-shadow:
        0 0 0 3px #333,
        0 20px 60px rgba(0,0,0,0.6);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      background: url('background.jpg') center center / cover no-repeat;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 22px;
      background: #000;
      border-radius: 0 0 16px 16px;
      z-index: 10;
    }

    .phone-notch::after {
      content: '';
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #1a1a2e;
      border-radius: 50%;
    }

    .horse-container {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .horse-container object,
    .horse-container img {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-35px) scale(0.625);
      transform-origin: bottom center;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-screen">
      <div class="phone-notch"></div>
      <div class="horse-container">
        <object data="horse.svg" type="image/svg+xml" aria-label="Caballo">
          <img src="horse.svg" alt="Caballo">
        </object>
      </div>
    </div>
  </div>
</body>
</html>
