<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quale animale fa per te?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Nunito Sans', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .phone {
      position: relative;
      width: 320px;
      height: 640px;
      background: #000;
      border-radius: 44px;
      padding: 14px;
      box-shadow: 0 0 0 3px #333, 0 24px 80px rgba(0,0,0,0.6);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      background: url('background.jpg') center center / cover no-repeat;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 24px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 20;
    }

    .phone-notch::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #2d4a3b;
      border-radius: 50%;
    }

    /* Horse layer */
    .horse-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }

    .horse-wrapper object,
    .horse-wrapper img {
      width: auto;
      height: auto;
      max-width: 80%;
      max-height: 50%;
      display: block;
    }

    /* Content */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 3;
      padding: 60px 28px 30px;
      text-align: center;
    }

    .typewriter-title {
      font-family: 'Caveat', cursive;
      font-size: 2.6rem;
      font-weight: 600;
      line-height: 1.15;
      min-height: 3.2rem;
      text-shadow: 0 2px 16px rgba(0,0,0,0.3);
      opacity: 0;
    }

    .typewriter-sub {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.82);
      min-height: 1.8rem;
      margin-top: 16px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
      opacity: 0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #fff;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      border-radius: 1px;
      opacity: 0.9;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .btns-container {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 220px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .btns-container.visible {
      opacity: 1;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      border: none;
      outline: none;
      text-align: center;
      font-family: 'Nunito Sans', sans-serif;
    }

    .btn-primary {
      background: #8faa7b;
      color: #1a3528;
      box-shadow: 0 6px 24px rgba(143, 170, 123, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 32px rgba(143, 170, 123, 0.45);
      background: #9dba87;
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-secondary {
      background: transparent;
      color: #d4c9b5;
      border: 1px solid rgba(212, 201, 181, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(212, 201, 181, 0.1);
      border-color: rgba(212, 201, 181, 0.5);
      transform: translateY(-1px);
    }

    @media (max-width: 400px) {
      .phone { width: 290px; height: 580px; border-radius: 36px; padding: 10px; }
      .phone-screen { border-radius: 28px; }
      .typewriter-title { font-size: 2.2rem; }
      .typewriter-sub { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="phone-screen">

      <div class="horse-wrapper">
        <object data="horse.svg" type="image/svg+xml" aria-label="Caballo">
          <img src="horse.svg" alt="Caballo">
        </object>
      </div>

      <div class="phone-notch"></div>

      <div class="content">
        <div class="typewriter-title" id="title-line"></div>
        <div class="typewriter-sub" id="sub-line"></div>

        <div class="btns-container" id="btns">
          <button class="btn btn-primary" onclick="startQuiz()">Inizia il test</button>
          <button class="btn btn-secondary">Come funziona</button>
        </div>
      </div>

    </div>
  </div>

  <!-- QUIZ & RESULT layers -->
  <div id="quiz-layer" style="display:none; position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; background:rgba(26,53,40,0.85); backdrop-filter:blur(8px);">
    <div style="background:rgba(255,255,255,0.06); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:32px 22px; width:280px; color:#fff; font-family:'Nunito Sans',sans-serif;">
      <div class="progress-bar" style="height:4px; background:rgba(255,255,255,0.08); border-radius:4px; margin-bottom:20px; overflow:hidden;">
        <div id="progress-fill" style="height:100%; background:#8faa7b; border-radius:4px; transition:width 0.5s ease;"></div>
      </div>
      <div id="question-text" style="font-size:1.1rem; font-weight:600; line-height:1.35; text-align:center; margin-bottom:22px;"></div>
      <div id="options-container"></div>
    </div>
  </div>

  <div id="result-layer" style="display:none; position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; background:rgba(26,53,40,0.85); backdrop-filter:blur(8px);">
    <div style="background:rgba(255,255,255,0.06); backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:32px 22px; width:280px; color:#fff; font-family:'Nunito Sans',sans-serif; text-align:center;">
      <div id="result-emoji" style="font-size:3.5rem; margin-bottom:10px;"></div>
      <div id="result-animal" style="font-size:1.5rem; font-weight:700; margin-bottom:6px; font-family:'Caveat',cursive;"></div>
      <div id="result-desc" style="font-size:0.82rem; color:rgba(255,255,255,0.7); line-height:1.5; margin-bottom:24px;"></div>
      <button class="btn btn-primary" onclick="restart()">Ricomincia</button>
    </div>
  </div>

  <style>
    #quiz-layer { display: none !important; }
    #result-layer { display: none !important; }
    #quiz-layer.active, #result-layer.active { display: flex !important; }
    .option {
      display: block; width: 100%; padding: 13px 16px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1);
      outline: none; text-align: left; font-family: 'Nunito Sans', sans-serif;
      color: #fff; background: rgba(255,255,255,0.05); margin-bottom: 8px;
    }
    .option:hover { background: rgba(255,255,255,0.12); border-color: #8faa7b; transform: translateX(4px); }
  </style>

  <script>
    const titleText = "Quale animale fa per te?";
    const subText = "Scopri quale compagno di vita è davvero compatibile con te.";

    const titleEl = document.getElementById('title-line');
    const subEl = document.getElementById('sub-line');
    const btnsEl = document.getElementById('btns');

    function typeWriter(el, text, speed, callback) {
      el.style.opacity = '1';
      let i = 0;
      function tick() {
        if (i < text.length) {
          el.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(tick, speed);
        } else {
          el.innerHTML = text;
          if (callback) callback();
        }
      }
      tick();
    }

    setTimeout(() => {
      typeWriter(titleEl, titleText, 50, () => {
        setTimeout(() => {
          typeWriter(subEl, subText, 30, () => {
            setTimeout(() => {
              btnsEl.classList.add('visible');
            }, 400);
          });
        }, 300);
      });
    }, 13000);

    // Quiz
    const questions = [
      {
        q: "Quanto spazio hai in casa?",
        options: [
          { label: "Un piccolo appartamento", dog: 1, cat: 3, rabbit: 4, fish: 5, bird: 3, hamster: 5 },
          { label: "Una casa con giardino", dog: 5, cat: 4, rabbit: 3, fish: 2, bird: 2, hamster: 2 }
        ]
      },
      {
        q: "Quanto tempo puoi dedicargli ogni giorno?",
        options: [
          { label: "Poco (meno di 1 ora)", dog: 1, cat: 3, rabbit: 3, fish: 5, bird: 3, hamster: 4 },
          { label: "Moderato (1-3 ore)", dog: 3, cat: 4, rabbit: 4, fish: 3, bird: 3, hamster: 3 },
          { label: "Tanto (più di 3 ore)", dog: 5, cat: 3, rabbit: 3, fish: 2, bird: 2, hamster: 2 }
        ]
      },
      {
        q: "Hai bambini piccoli in casa?",
        options: [
          { label: "Sì", dog: 4, cat: 2, rabbit: 2, fish: 5, bird: 2, hamster: 3 },
          { label: "No", dog: 3, cat: 4, rabbit: 4, fish: 3, bird: 3, hamster: 3 }
        ]
      },
      {
        q: "Il tuo stile di vita è:",
        options: [
          { label: "Attivo e sportivo", dog: 5, cat: 1, rabbit: 2, fish: 1, bird: 1, hamster: 2 },
          { label: "Tranquillo e casalingo", dog: 2, cat: 5, rabbit: 4, fish: 4, bird: 3, hamster: 4 }
        ]
      },
      {
        q: "Preferisci un animale:",
        options: [
          { label: "Indipendente", dog: 2, cat: 5, rabbit: 3, fish: 5, bird: 3, hamster: 4 },
          { label: "Affettuoso e presente", dog: 5, cat: 3, rabbit: 4, fish: 1, bird: 2, hamster: 3 }
        ]
      }
    ];

    const animals = [
      { id: 'dog', name: 'Cane', emoji: '🐕', desc: 'Un compagno fedele e attivo. Perfetto per chi ha spazio, tempo e ama la vita all\'aperto!' },
      { id: 'cat', name: 'Gatto', emoji: '🐈', desc: 'Indipendente ma affettuoso. Ideale per chi cerca un amico elegante e poco impegnativo.' },
      { id: 'rabbit', name: 'Coniglio', emoji: '🐇', desc: 'Dolce e socievole, perfetto per famiglie e spazi medi. Richiede cure ma regala tanto amore.' },
      { id: 'fish', name: 'Pesce', emoji: '🐟', desc: 'Silenzioso e rilassante. Ottimo per chi ha poco tempo o spazio ma ama la bellezza.' },
      { id: 'bird', name: 'Uccello', emoji: '🐦', desc: 'Allegro e vivace, porta colore e musica in casa. Adatto a spazi medi.' },
      { id: 'hamster', name: 'Criceto', emoji: '🐹', desc: 'Piccolo e facile da gestire. Perfetto per principianti e spazi ridotti.' }
    ];

    let currentQuestion = 0;
    let scores = { dog: 0, cat: 0, rabbit: 0, fish: 0, bird: 0, hamster: 0 };

    function startQuiz() {
      document.getElementById('quiz-layer').classList.add('active');
      currentQuestion = 0;
      scores = { dog: 0, cat: 0, rabbit: 0, fish: 0, bird: 0, hamster: 0 };
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('progress-fill').style.width = (currentQuestion / questions.length * 100) + '%';
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.label;
        btn.onclick = () => selectOption(i);
        container.appendChild(btn);
      });
    }

    function selectOption(index) {
      const q = questions[currentQuestion];
      const opt = q.options[index];
      for (const key in opt) {
        if (key !== 'label' && scores[key] !== undefined) scores[key] += opt[key];
      }
      currentQuestion++;
      if (currentQuestion >= questions.length) showResult();
      else renderQuestion();
    }

    function showResult() {
      document.getElementById('quiz-layer').classList.remove('active');
      let best = null, bestScore = -1;
      for (const key in scores) {
        if (scores[key] > bestScore) { bestScore = scores[key]; best = key; }
      }
      const animal = animals.find(a => a.id === best);
      document.getElementById('result-emoji').textContent = animal.emoji;
      document.getElementById('result-animal').textContent = animal.name;
      document.getElementById('result-desc').textContent = animal.desc;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('result-layer').classList.add('active');
    }

    function restart() {
      document.getElementById('result-layer').classList.remove('active');
    }
  </script>

</body>
</html>
